# Add this service to your existing /docker/paperclip-d0sw/docker-compose.yml

fundgrube-mcp-bridge:
  build:
    context: ./data/instances/default/workspaces/4b56645f-1b3a-408d-bb8f-c9e671a302fb/plugins/fundgrube-mcp-bridge
  restart: unless-stopped
  environment:
    PORT: "8792"
    BRIDGE_BASE_PATH: "/fundgrube"
    MCP_ENDPOINT: "https://wayati.com/fundgrube/orderman/mcp/mcp-server.php"
  labels:
    - "traefik.enable=true"
    - "traefik.http.routers.fundgrube-mcp-bridge.rule=Host(`paperclip-d0sw.srv1628724.hstgr.cloud`) && PathPrefix(`/fundgrube`)"
    - "traefik.http.routers.fundgrube-mcp-bridge.entrypoints=websecure"
    - "traefik.http.routers.fundgrube-mcp-bridge.tls=true"
    - "traefik.http.services.fundgrube-mcp-bridge.loadbalancer.server.port=8792"
